<!DOCTYPE html>
<html>
<head>
  <title>Add Your Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.55);
      z-index: -1;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-box {
      position: relative;
      width: 420px;
      max-width: 92%;
      padding: 34px 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 18px rgba(206, 92, 240, 0.28),
        0 0 42px rgba(151, 37, 163, 0.24);
      overflow: hidden;
    }

    .form-box::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: 24px;
      background: linear-gradient(90deg, #ff4fd8, #ce5cf0, #8fd3ff, #ff4fd8);
      background-size: 300% 300%;
      animation: borderMove 5s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes borderMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 30px;
      text-shadow: 0 0 16px rgba(255, 138, 252, 0.6);
    }

    .subtitle {
      text-align: center;
      margin-bottom: 24px;
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      letter-spacing: 0.4px;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 15px;
      margin-bottom: 14px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      color: white;
      outline: none;
      font-family: inherit;
    }

    input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    select option {
      color: black;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #ce5cf0, #9725a3);
      color: white;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(206,92,240,0.35);
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(206,92,240,0.48);
    }

    .secondary-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.12);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="Background.mp4" type="video/mp4">
  </video>

  <div class="wrap">
    <div class="form-box">
      <h1>Add Your Service</h1>
      <div class="subtitle">Submit your service details</div>

      <form action="https://formsubmit.co/jkiptv8@gmail.com" method="POST">
        <input type="text" name="access_code" placeholder="Choose a access code" required>

        <select name="playlist_type" required>
          <option value="">What type of playlist is it</option>
          <option value="Xtream Codes">Xtream Codes</option>
          <option value="M3U Playlist">M3U Playlist</option>
          <option value="MAG">MAG</option>
          <option value="Other">Other</option>
        </select>

        <input type="text" name="dns" placeholder="Enter DNS" required>
        <input type="email" name="email" placeholder="Enter email address" required>

        <input type="hidden" name="_subject" value="New STACKZ Service Request">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://stackz-player.onrender.com/login.html">

        <button type="submit">Send</button>
      </form>

      <button class="secondary-btn" onclick="goBack()">Back</button>
    </div>
  </div>
<script>
  function goBack() {
    if (document.referrer) {
      window.history.back();
    } else {
      window.location.href = "index.html";
    }
  }
</script>
</body>
</html>
