<!DOCTYPE html>
<html>
<head>
  <title>Loading Stackz Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: url("background.png") no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 0, 20, 0.68);
      z-index: 0;
    }

    .loading-box {
      position: relative;
      z-index: 1;
      width: 560px;
      max-width: 90%;
      padding: 35px 30px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 20px rgba(206, 92, 240, 0.25),
        0 0 50px rgba(151, 37, 163, 0.18);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .title {
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
      text-shadow: 0 0 18px rgba(255, 138, 252, 0.65);
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.75);
      margin-bottom: 28px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .item {
      margin-bottom: 18px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .status {
      color: #f3c8ff;
      font-size: 13px;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
    }

    .progress {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #5A108A, #9725A3, #CE5CF0, #EF80F3);
      box-shadow: 0 0 18px rgba(206, 92, 240, 0.8);
      transition: width 0.45s ease;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="loading-box">
    <div class="title">Loading Stackz Player</div>
    <div class="subtitle">Preparing everything before launch...</div>

    <div class="item">
      <div class="row">
        <span>📺 Live TV</span>
        <span id="liveStatus" class="status">Waiting...</span>
      </div>
      <div class="bar"><div id="liveBar" class="progress"></div></div>
    </div>

    <div class="item">
      <div class="row">
        <span>🎬 Movies</span>
        <span id="movieStatus" class="status">Waiting...</span>
      </div>
      <div class="bar"><div id="movieBar" class="progress"></div></div>
    </div>

    <div class="item">
      <div class="row">
        <span>📺 Series</span>
        <span id="seriesStatus" class="status">Waiting...</span>
      </div>
      <div class="bar"><div id="seriesBar" class="progress"></div></div>
    </div>

    <div class="footer" id="finalStatus">Connecting...</div>
  </div>

  <script>
    const dns = localStorage.getItem("dns");
    const username = localStorage.getItem("username");
    const password = localStorage.getItem("password");

    if (!dns || !username || !password) {
      document.getElementById("finalStatus").textContent = "Missing login details. Returning...";
      setTimeout(() => window.location.href = "login.html", 1500);
    }

    function updateBar(barId, statusId, percent, text) {
      document.getElementById(barId).style.width = percent + "%";
      document.getElementById(statusId).textContent = text;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      const text = await res.text();

      if (!res.ok) {
        throw new Error(`Request failed: ${res.status} ${text}`);
      }

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(`Invalid JSON: ${text.slice(0, 120)}`);
      }

      if (!Array.isArray(data)) {
        throw new Error("Response was not a list");
      }

      return data;
    }

    async function loadLive() {
      try {
        updateBar("liveBar", "liveStatus", 15, "Connecting...");
        const [channels, categories] = await Promise.all([
          fetchJson(`${window.location.origin}/get-channels?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`),
          fetchJson(`${window.location.origin}/get-live-categories?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`)
        ]);

        updateBar("liveBar", "liveStatus", 80, "Caching...");
        localStorage.setItem("cachedLive", JSON.stringify(channels));
        localStorage.setItem("cachedLiveCategories", JSON.stringify(categories));

        updateBar("liveBar", "liveStatus", 100, `Ready (${channels.length})`);
        return true;
      } catch (err) {
        console.error("Live preload error:", err);
        updateBar("liveBar", "liveStatus", 100, "Failed");
        return false;
      }
    }

    async function loadMovies() {
      try {
        updateBar("movieBar", "movieStatus", 15, "Connecting...");
        const [movies, categories] = await Promise.all([
          fetchJson(`${window.location.origin}/get-movies?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`),
          fetchJson(`${window.location.origin}/get-movie-categories?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`)
        ]);

        updateBar("movieBar", "movieStatus", 80, "Caching...");
        localStorage.setItem("cachedMovies", JSON.stringify(movies));
        localStorage.setItem("cachedMovieCategories", JSON.stringify(categories));

        updateBar("movieBar", "movieStatus", 100, `Ready (${movies.length})`);
        return true;
      } catch (err) {
        console.error("Movie preload error:", err);
        updateBar("movieBar", "movieStatus", 100, "Failed");
        return false;
      }
    }

    async function loadSeries() {
      try {
        updateBar("seriesBar", "seriesStatus", 15, "Connecting...");
        const [series, categories] = await Promise.all([
          fetchJson(`${window.location.origin}/get-series?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`),
          fetchJson(`${window.location.origin}/get-series-categories?dns=${encodeURIComponent(dns)}&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`)
        ]);

        updateBar("seriesBar", "seriesStatus", 80, "Caching...");
        localStorage.setItem("cachedSeries", JSON.stringify(series));
        localStorage.setItem("cachedSeriesCategories", JSON.stringify(categories));

        updateBar("seriesBar", "seriesStatus", 100, `Ready (${series.length})`);
        return true;
      } catch (err) {
        console.error("Series preload error:", err);
        updateBar("seriesBar", "seriesStatus", 100, "Failed");
        return false;
      }
    }

    async function startLoading() {
      document.getElementById("finalStatus").textContent = "Loading content...";

      const [liveOk, moviesOk, seriesOk] = await Promise.all([
        loadLive(),
        loadMovies(),
        loadSeries()
      ]);

      if (liveOk || moviesOk || seriesOk) {
        document.getElementById("finalStatus").textContent = "Everything ready. Launching player...";
        setTimeout(() => {
          window.location.href = "player.html";
        }, 900);
      } else {
        document.getElementById("finalStatus").textContent = "Nothing could be loaded. Check backend or login details.";
      }
    }

    startLoading();
  </script>
</body>
</html>
