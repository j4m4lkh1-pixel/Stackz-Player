<!DOCTYPE html>
<html>
<head>
  <title>Stackz Player</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: url("background.png") no-repeat center center/cover;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(10, 0, 20, 0.45);
      z-index: 0;
    }

    .top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2;
      display: flex;
      gap: 10px;
    }

    input {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: white;
      backdrop-filter: blur(10px);
      width: 180px;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #CE5CF0, #EF80F3);
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      font-size: 42px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px #ff8afc;
    }

    #noticeOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .notice-box {
      width: 520px;
      max-width: 92%;
      background: rgba(17, 24, 39, 0.95);
      border-radius: 20px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .notice-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #ce5cf0;
      text-shadow: 0 0 16px rgba(206,92,240,0.35);
    }

    .notice-text {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 22px;
      color: rgba(255,255,255,0.9);
    }

    .notice-btn {
      min-width: 180px;
      padding: 13px 22px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(90deg, #ce5cf0, #8fd3ff);
      color: white;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(206,92,240,0.35);
    }
  </style>
</head>

<body>

  <div id="noticeOverlay">
    <div class="notice-box">
      <div class="notice-title">Important Notice</div>
      <div class="notice-text">
        Stackz Player is strictly a standalone media player. It does not provide, host, sell, or promote any media content, TV channels, or streaming services. Users must add and manage their own legally acquired media.
      </div>
      <button class="notice-btn" onclick="closeNotice()">I understand</button>
    </div>
  </div>

  <div class="top-right">
    <input type="text" id="accessCode" placeholder="Access code">
    <button onclick="checkCode()">Enter</button>
  </div>

  <div class="center-text">
    WELCOME TO STACKZ PLAYER
  </div>

  <script>
    function closeNotice() {
      document.getElementById("noticeOverlay").style.display = "none";
    }

    async function checkCode() {
      const code = document.getElementById("accessCode").value;

      try {
        const res = await fetch(`http://localhost:3000/get-dns?code=${code}`);
        const data = await res.json();

        if (data.success) {
          localStorage.setItem("dns", data.dns);
          window.location.href = "login.html";
        } else {
          alert("Invalid access code");
        }
      } catch (err) {
        console.error(err);
        alert("Cannot connect to backend server");
      }
    }
  </script>

</body>
</html>
