<!DOCTYPE html>
<html>
<head>
  <title>Stackz Player</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: white;
      background: url("background.png") no-repeat center center/cover;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(10, 0, 20, 0.45);
      z-index: 0;
    }

    .top-right {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 2;
      display: flex;
      gap: 10px;
    }

    input {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: white;
      backdrop-filter: blur(10px);
      width: 180px;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      padding: 12px 18px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(45deg, #CE5CF0, #EF80F3);
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      font-size: 42px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px #ff8afc;
    }
  </style>
</head>

<body>

  <div class="top-right">
    <input type="text" id="accessCode" placeholder="Access code">
    <button onclick="checkCode()">Enter</button>
  </div>

  <div class="center-text">
    WELCOME TO STACKZ PLAYER
  </div>

  <script>
    async function checkCode() {
      const code = document.getElementById("accessCode").value;

      try {
        const res = await fetch(`http://localhost:3000/get-dns?code=${code}`);
        const data = await res.json();

        if (data.success) {
          localStorage.setItem("dns", data.dns);
          window.location.href = "login.html";
        } else {
          alert("Invalid access code");
        }
      } catch (err) {
        console.error(err);
        alert("Cannot connect to backend server");
      }
    }
  </script>

</body>
</html>
